# Silencer lobby server — Docker Compose
#
# Port 15170 is used instead of the canonical 517 to avoid requiring root
# on the host.  Build the Mac client with the matching port:
#
#   LOBBY_PORT=15170 ./infra/scripts/build-mac-local.sh
#
# To expose the lobby at a real IP (e.g. a cloud VM), set PUBLIC_ADDR:
#
#   PUBLIC_ADDR=1.2.3.4 docker compose -f infra/docker-compose.yml up -d

name: silencer

services:
  mongo:
    image: mongo:7
    ports:
      - "28017:27017"
    volumes:
      - mongo-data:/data/db
    restart: unless-stopped

  rabbitmq:
    image: rabbitmq:3-management
    ports:
      - "25672:5672"     # AMQP
      - "25673:15672"    # Management UI
    environment:
      RABBITMQ_DEFAULT_USER: silencer
      RABBITMQ_DEFAULT_PASS: silencer
    volumes:
      - rabbitmq-data:/var/lib/rabbitmq
    restart: unless-stopped

  lobby:
    build:
      context: ..
      dockerfile: services/lobby/Dockerfile
    ports:
      - "15170:15170/tcp"
      - "15170:15170/udp"
      - "15172:15172/tcp"
      - "20000-20199:20000-20199/udp"
    volumes:
      - lobby-data:/data
    depends_on:
      - mongo
      - rabbitmq
    environment:
      AMQP_URL: "amqp://silencer:silencer@rabbitmq:5672/"
      MONGO_URL: "mongodb://mongo:27017/silencer"
    command:
      - "-addr"
      - ":15170"
      - "-public-addr"
      - "${PUBLIC_ADDR:-127.0.0.1}"
      - "-version"
      - "00040"
      - "-db"
      - "/data/lobby.json"
      - "-game-binary"
      - "/usr/local/bin/silencer"
      - "-game-port-base"
      - "20000"
      - "-game-port-count"
      - "200"
      - "-amqp-url"
      - "amqp://silencer:silencer@rabbitmq:5672/"
      - "-map-api-addr"
      - ":15172"
      - "-maps-dir"
      - "/data/maps"
    restart: unless-stopped

  admin-api:
    build:
      context: ..
      dockerfile: services/admin-api/Dockerfile
    ports:
      - "24080:24080"
    depends_on:
      - mongo
      - rabbitmq
    environment:
      PORT: "24080"
      MONGO_URL: "mongodb://mongo:27017/silencer"
      AMQP_URL: "amqp://silencer:silencer@rabbitmq:5672/"
      JWT_SECRET: "${JWT_SECRET:-changeme-in-production}"
      LOBBY_PLAYER_AUTH_URL: "http://lobby:15171"
      LOBBY_MAP_API_URL: "http://lobby:15172"
      BACKUP_DIR: "/backups"
      BACKUP_CRON: "0 */6 * * *"
      BACKUP_KEEP: "10"
      GITHUB_TOKEN: "${GITHUB_TOKEN:-}"
      GITHUB_BACKUP_REPO: "${GITHUB_BACKUP_REPO:-Arsia-Mons/silencer-mongo-backup}"
      ASSETS_DIR: "/assets"
    volumes:
      - backup-data:/backups
      - ../shared/assets:/assets
    restart: unless-stopped

  admin-web:
    build:
      context: ..
      dockerfile: web/admin/Dockerfile
      args:
        NEXT_PUBLIC_API_URL: "http://${PUBLIC_ADDR:-localhost}:24080"
        NEXT_PUBLIC_WS_URL: "ws://${PUBLIC_ADDR:-localhost}:24080"
        NEXT_PUBLIC_MAP_API_URL: "http://${PUBLIC_ADDR:-localhost}:15172"
    ports:
      - "24000:24000"
    depends_on:
      - admin-api
    environment:
      PORT: "24000"
    restart: unless-stopped

volumes:
  lobby-data:
  mongo-data:
  rabbitmq-data:
  backup-data:
