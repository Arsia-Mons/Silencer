name: Deploy admin-web

on:
  push:
    branches: [main]
    paths:
      - 'web/admin/**'
      - '.github/workflows/deploy-admin-web.yml'
  workflow_dispatch:

concurrency:
  group: deploy-admin-web
  cancel-in-progress: false

jobs:
  build-and-deploy:
    runs-on: ubuntu-24.04-arm
    timeout-minutes: 20
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4

      - name: Compute image ref
        id: img
        run: |
          set -euo pipefail
          OWNER="$(echo '${{ github.repository_owner }}' | tr '[:upper:]' '[:lower:]')"
          IMAGE="ghcr.io/$OWNER/silencer-admin-web"
          SHORT="${GITHUB_SHA:0:8}"
          echo "image=$IMAGE" >> "$GITHUB_OUTPUT"
          echo "tag=$SHORT"   >> "$GITHUB_OUTPUT"
          echo "ref=$IMAGE:$SHORT" >> "$GITHUB_OUTPUT"

      - uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      # No NEXT_PUBLIC_* build args — empty values cause the client
      # bundle to use relative URLs, which Cloudflare Tunnel routes per
      # path on admin.arsiamons.com (see lib/api.js + lib/socket.js).
      - name: Build + push image (ARM64 native)
        uses: docker/build-push-action@v6
        with:
          context: web/admin
          file: web/admin/Dockerfile
          push: true
          platforms: linux/arm64
          tags: |
            ${{ steps.img.outputs.ref }}
            ${{ steps.img.outputs.image }}:latest
          cache-from: type=gha,scope=admin-web
          cache-to: type=gha,scope=admin-web,mode=max

      - name: Tailscale
        run: |
          curl -fsSL https://tailscale.com/install.sh | sh
          sudo tailscale up \
            --authkey='${{ secrets.TS_AUTHKEY }}' \
            --hostname=gh-runner-${{ github.run_id }} \
            --advertise-tags=tag:server

      - name: Configure SSH
        run: |
          mkdir -p ~/.ssh
          printf '%s\n' "${{ secrets.DEPLOY_SSH_KEY }}" > ~/.ssh/deploy
          chmod 600 ~/.ssh/deploy

      - name: Deploy via SSH
        env:
          HOST: ${{ vars.ADMIN_DEPLOY_HOST }}
          IMAGE_REF: ${{ steps.img.outputs.ref }}
        run: |
          set -euo pipefail
          ssh -i ~/.ssh/deploy \
              -o StrictHostKeyChecking=accept-new \
              -o UserKnownHostsFile=~/.ssh/known_hosts \
              "ubuntu@$HOST" "
            set -e
            echo 'IMAGE=$IMAGE_REF' | sudo tee /etc/silencer/admin-web.image > /dev/null
            sudo systemctl restart silencer-admin-web
            sleep 5
            sudo systemctl is-active silencer-admin-web
          "
