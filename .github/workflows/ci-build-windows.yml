name: CI Build (Windows)

on:
  pull_request:
    types: [opened, synchronize, reopened, ready_for_review]
    paths-ignore:
      - 'services/**'
      - 'web/**'
      - 'infra/**'
      - 'docs/**'
      - 'designer/**'
      - 'shared/design/**'
      - 'shared/skills/**'
      - '*.md'
      - '.gitignore'
      - '.github/workflows/ci-build-admin-*.yml'
      - '.github/workflows/ci-build-lobby-docker.yml'
      - '.github/workflows/deploy*.yml'
      - '.github/workflows/release.yml'
  push:
    branches: [main]
    paths-ignore:
      - 'services/**'
      - 'web/**'
      - 'infra/**'
      - 'docs/**'
      - 'designer/**'
      - 'shared/design/**'
      - 'shared/skills/**'
      - '*.md'
      - '.gitignore'
      - '.github/workflows/ci-build-admin-*.yml'
      - '.github/workflows/ci-build-lobby-docker.yml'
      - '.github/workflows/deploy*.yml'
      - '.github/workflows/release.yml'

concurrency:
  group: ci-build-windows-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

jobs:
  build-windows:
    if: github.event_name == 'push' || github.event.pull_request.draft == false
    runs-on: windows-latest
    timeout-minutes: 30
    env:
      # mozilla-actions/sccache-action exposes ACTIONS_CACHE_URL +
      # ACTIONS_RUNTIME_TOKEN, but sccache only routes through the GHA
      # backend when this is set — otherwise it writes to the runner's
      # local disk and every fresh runner starts with an empty cache
      # (100% miss rate).
      SCCACHE_GHA_ENABLED: "true"
    steps:
      - uses: actions/checkout@v4

      - name: Cache vcpkg binaries
        uses: actions/cache@v4
        with:
          path: ${{ github.workspace }}/.vcpkg-cache
          key: vcpkg-${{ runner.os }}-${{ hashFiles('clients/silencer/vcpkg.json') }}
          restore-keys: |
            vcpkg-${{ runner.os }}-

      - name: Cache vcpkg tool downloads
        uses: actions/cache@v4
        with:
          path: C:\vcpkg\downloads\tools
          key: vcpkg-tools-${{ runner.os }}-v1

      - name: Setup sccache
        uses: mozilla-actions/sccache-action@v0.0.10

      - name: Setup MSVC dev environment
        uses: ilammy/msvc-dev-cmd@v1
        with:
          arch: x64

      - name: Configure
        shell: pwsh
        env:
          VCPKG_BINARY_SOURCES: "clear;files,${{ github.workspace }}/.vcpkg-cache,readwrite"
        run: |
          cmake -B build -S clients/silencer `
            -G Ninja `
            -DCMAKE_BUILD_TYPE=Release `
            -DCMAKE_TOOLCHAIN_FILE="$env:VCPKG_INSTALLATION_ROOT/scripts/buildsystems/vcpkg.cmake" `
            -DVCPKG_TARGET_TRIPLET=x64-windows `
            -DCMAKE_C_COMPILER_LAUNCHER=sccache `
            -DCMAKE_CXX_COMPILER_LAUNCHER=sccache `
            -DSILENCER_UNITY_BUILD=ON

      - name: Build
        run: cmake --build build

      - name: sccache stats
        if: always()
        shell: pwsh
        run: sccache --show-stats

      - name: Package
        shell: pwsh
        run: |
          $stage = "build/package/silencer"
          New-Item -ItemType Directory -Force -Path $stage | Out-Null
          Copy-Item build/Silencer.exe $stage/
          $vcpkgBin = "build/vcpkg_installed/x64-windows/bin"
          Copy-Item "$vcpkgBin/*.dll" $stage/
          Copy-Item -Recurse shared/assets $stage/assets
          Write-Host "--- packaged files ---"
          Get-ChildItem $stage

      - name: Verify bundled dependencies
        shell: pwsh
        run: pwsh tests/e2e/check-bundle-windows.ps1 -PackageDir build/package/silencer
