name: Release

on:
  push:
    tags: ['v*']
  workflow_dispatch:

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-macos:
    runs-on: macos-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v4

      - name: Install deps (Homebrew)
        # SDL3 and especially SDL3_mixer aren't reliably in homebrew-core
        # on the macos-latest runner image — install via setup-sdl below
        # (same approach as deploy.yml's Linux build).
        run: brew install minizip dylibbundler

      - name: Install SDL3 + SDL3_mixer
        uses: libsdl-org/setup-sdl@main
        with:
          version: 3-latest
          version-sdl-mixer: 3-latest

      - name: Configure
        env:
          LOBBY_HOST: ${{ vars.LOBBY_HOST }}
        run: |
          lobby="${LOBBY_HOST:-lobby.arsiamons.com}"
          cmake -B build -S clients/silencer \
            -DCMAKE_BUILD_TYPE=Release \
            -DCMAKE_OSX_DEPLOYMENT_TARGET=11.0 \
            -DSILENCER_UNITY_BUILD=ON \
            -DSILENCER_LOBBY_HOST="$lobby" \
            -DSILENCER_MAP_API_URL="https://admin.arsiamons.com" \
            -DSILENCER_VERSION="${GITHUB_REF_NAME#v}"

      - name: Build
        run: cmake --build build --config Release -j"$(sysctl -n hw.ncpu)"

      - name: Bundle dylibs
        working-directory: build
        run: |
          mkdir -p Silencer.app/Contents/Frameworks
          # setup-sdl exports SDL3_ROOT + SDL3_mixer_ROOT env vars pointing
          # at the per-runner install dirs (/var/folders/.../setupsdl/...).
          # Pass them to dylibbundler as -s search paths so it can resolve
          # @rpath/libSDL3*.dylib references in the binary. Without these,
          # dylibbundler drops into an interactive prompt loop and hangs.
          echo "--- SDL3 install roots ---"
          echo "  SDL3_ROOT=$SDL3_ROOT"
          echo "  SDL3_mixer_ROOT=$SDL3_mixer_ROOT"
          dylibbundler \
            -s "$SDL3_ROOT/lib" \
            -s "$SDL3_mixer_ROOT/lib" \
            --overwrite-dir \
            --bundle-deps \
            --create-dir \
            --fix-file Silencer.app/Contents/MacOS/Silencer \
            --dest-dir Silencer.app/Contents/Frameworks/ \
            --install-path @rpath/ \
            </dev/null
          install_name_tool -add_rpath @executable_path/../Frameworks \
            Silencer.app/Contents/MacOS/Silencer 2>/dev/null || true
          echo "--- bundled dylibs ---"
          ls Silencer.app/Contents/Frameworks/
          echo "--- main binary linkage ---"
          otool -L Silencer.app/Contents/MacOS/Silencer

      - name: Import Developer ID cert
        env:
          CERT_P12_BASE64: ${{ secrets.APPLE_CERT_P12_BASE64 }}
          CERT_P12_PASSWORD: ${{ secrets.APPLE_CERT_P12_PASSWORD }}
        run: |
          KEYCHAIN_PASSWORD="$(openssl rand -base64 24)"
          echo "KEYCHAIN_PASSWORD=$KEYCHAIN_PASSWORD" >> "$GITHUB_ENV"
          echo "$CERT_P12_BASE64" | base64 --decode > /tmp/cert.p12
          security create-keychain -p "$KEYCHAIN_PASSWORD" build.keychain
          security set-keychain-settings -lut 21600 build.keychain
          security unlock-keychain -p "$KEYCHAIN_PASSWORD" build.keychain
          security import /tmp/cert.p12 -P "$CERT_P12_PASSWORD" \
            -A -t cert -f pkcs12 -k build.keychain
          security list-keychains -d user -s build.keychain \
            $(security list-keychains -d user | tr -d '"')
          security set-key-partition-list -S apple-tool:,apple:,codesign: \
            -s -k "$KEYCHAIN_PASSWORD" build.keychain
          rm /tmp/cert.p12
          security find-identity -v -p codesigning build.keychain

      - name: Codesign with Developer ID
        working-directory: build
        env:
          TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
        run: |
          IDENTITY="Developer ID Application"
          # Sign inside-out: dylibs first, then main binary, then bundle.
          # --options runtime (Hardened Runtime) + --timestamp are required
          # by notarytool.
          find Silencer.app/Contents/Frameworks -name "*.dylib" -print0 \
            | xargs -0 -n1 codesign --force --timestamp --options runtime \
              --sign "$IDENTITY"
          codesign --force --timestamp --options runtime \
            --sign "$IDENTITY" Silencer.app/Contents/MacOS/Silencer
          codesign --force --timestamp --options runtime \
            --sign "$IDENTITY" Silencer.app
          codesign --verify --deep --strict --verbose=2 Silencer.app

      - name: Notarize and staple
        working-directory: build
        env:
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APPLE_APP_PASSWORD: ${{ secrets.APPLE_APP_PASSWORD }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
        run: |
          ditto -ck --keepParent Silencer.app /tmp/notarize.zip
          xcrun notarytool submit /tmp/notarize.zip \
            --apple-id "$APPLE_ID" \
            --password "$APPLE_APP_PASSWORD" \
            --team-id "$APPLE_TEAM_ID" \
            --wait
          rm /tmp/notarize.zip
          xcrun stapler staple Silencer.app
          xcrun stapler validate Silencer.app
          spctl -a -vv -t execute Silencer.app

      - name: Package .app
        working-directory: build
        run: |
          ditto -ck --sequesterRsrc --keepParent Silencer.app silencer-macos-arm64.zip

      - name: Clean up keychain
        if: always()
        run: |
          security delete-keychain build.keychain || true

      - uses: actions/upload-artifact@v4
        with:
          name: macos-arm64
          path: build/silencer-macos-arm64.zip
          if-no-files-found: error

  build-windows:
    runs-on: windows-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4

      - name: Cache vcpkg binaries
        uses: actions/cache@v4
        with:
          path: ${{ github.workspace }}/.vcpkg-cache
          key: vcpkg-${{ runner.os }}-${{ hashFiles('clients/silencer/vcpkg.json') }}
          restore-keys: |
            vcpkg-${{ runner.os }}-

      - name: Cache vcpkg tool downloads
        uses: actions/cache@v4
        with:
          path: C:\vcpkg\downloads\tools
          key: vcpkg-tools-${{ runner.os }}-v1

      - name: Setup MSVC dev environment
        uses: ilammy/msvc-dev-cmd@v1
        with:
          arch: x64

      - name: Configure
        shell: pwsh
        env:
          LOBBY_HOST: ${{ vars.LOBBY_HOST }}
          VCPKG_BINARY_SOURCES: "clear;files,${{ github.workspace }}/.vcpkg-cache,readwrite"
        run: |
          $lobby = if ($env:LOBBY_HOST) { $env:LOBBY_HOST } else { "lobby.arsiamons.com" }
          $ver = $env:GITHUB_REF_NAME -replace '^v', ''
          cmake -B build -S clients/silencer `
            -G Ninja `
            -DCMAKE_BUILD_TYPE=Release `
            -DCMAKE_TOOLCHAIN_FILE="$env:VCPKG_INSTALLATION_ROOT/scripts/buildsystems/vcpkg.cmake" `
            -DVCPKG_TARGET_TRIPLET=x64-windows `
            -DSILENCER_UNITY_BUILD=ON `
            -DSILENCER_LOBBY_HOST="$lobby" `
            -DSILENCER_MAP_API_URL="https://admin.arsiamons.com" `
            -DSILENCER_VERSION="$ver"

      - name: Build
        run: cmake --build build

      - name: Package
        shell: pwsh
        run: |
          $stage = "build/package/silencer"
          New-Item -ItemType Directory -Force -Path $stage | Out-Null
          Copy-Item build/Silencer.exe $stage/
          # SDL3 / SDL3_mixer / zlib + transitive audio codec DLLs live in
          # the vcpkg manifest-mode install dir. Bulk-copy them so the zip
          # is self-contained — without these, Silencer.exe fails to start
          # with a missing SDL3.dll error on machines without vcpkg.
          $vcpkgBin = "build/vcpkg_installed/x64-windows/bin"
          Copy-Item "$vcpkgBin/*.dll" $stage/
          # Ship assets next to the .exe as `assets/` — Windows runtime
          # (`os.cpp` GetResDir) looks for `<exepath>\assets\`.
          Copy-Item -Recurse shared/assets $stage/assets
          Write-Host "--- packaged files ---"
          Get-ChildItem $stage
          Compress-Archive -Path "build/package/silencer" -DestinationPath build/silencer-windows-x64.zip -Force

      - uses: actions/upload-artifact@v4
        with:
          name: windows-x64
          path: build/silencer-windows-x64.zip
          if-no-files-found: error

  build-linux:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4

      - name: Install build deps
        # SDL3 itself comes from setup-sdl below (built from source). The list
        # here is what setup-sdl needs at configure time + minizip + patchelf
        # (used post-build to point the binary's RUNPATH at $ORIGIN so it
        # loads the bundled SDL3 from the same dir as the executable).
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            build-essential cmake ninja-build patchelf pkg-config \
            libminizip-dev libcurl4-openssl-dev \
            libasound2-dev libpulse-dev libudev-dev libxext-dev \
            libxinerama-dev libxcursor-dev libxrandr-dev libxss-dev \
            libwayland-dev libxkbcommon-dev libdbus-1-dev libibus-1.0-dev

      - name: Install SDL3 + SDL3_mixer
        uses: libsdl-org/setup-sdl@main
        with:
          version: 3-latest
          version-sdl-mixer: 3-latest

      - name: Configure
        env:
          LOBBY_HOST: ${{ vars.LOBBY_HOST }}
        run: |
          lobby="${LOBBY_HOST:-lobby.arsiamons.com}"
          cmake -B build -S clients/silencer \
            -G Ninja \
            -DCMAKE_BUILD_TYPE=Release \
            -DSILENCER_UNITY_BUILD=ON \
            -DSILENCER_LOBBY_HOST="$lobby" \
            -DSILENCER_MAP_API_URL="https://admin.arsiamons.com" \
            -DSILENCER_VERSION="${GITHUB_REF_NAME#v}"

      - name: Build
        run: cmake --build build -j"$(nproc)"

      - name: Bundle SDL3 + assets
        run: |
          stage="build/package/silencer"
          mkdir -p "$stage"
          cp build/silencer "$stage/"
          # setup-sdl exposes per-runner install roots via SDL3_ROOT /
          # SDL3_mixer_ROOT (same env as the macOS job uses for dylibbundler).
          # Copy each .so dereferenced — the binary's NEEDED entry is the
          # soname (libSDL3.so.0), so a single regular file at that path is
          # what dlopen wants.
          echo "--- SDL3 install roots ---"
          echo "  SDL3_ROOT=$SDL3_ROOT"
          echo "  SDL3_mixer_ROOT=$SDL3_mixer_ROOT"
          cp -L "$SDL3_ROOT/lib/libSDL3.so.0" "$stage/"
          cp -L "$SDL3_mixer_ROOT/lib/libSDL3_mixer.so.0" "$stage/"
          # Point the binary at $ORIGIN so the bundled SDL3 loads from the
          # same directory as the executable instead of the build-time
          # install paths (which don't exist on users' machines).
          patchelf --set-rpath '$ORIGIN' "$stage/silencer"
          # Assets next to the binary — `os.cpp` CDResDir's Linux fallback
          # is `<exe>/assets/`.
          cp -r shared/assets "$stage/assets"
          echo "--- bundled files ---"
          ls -la "$stage"
          echo "--- ldd output ---"
          ldd "$stage/silencer"
          # Fail loudly if the dynamic loader can't resolve everything from
          # the bundle + base system.
          if ldd "$stage/silencer" | grep -F "not found"; then
            echo "ERROR: missing dynamic library dependencies"
            exit 1
          fi

      - name: Package
        run: |
          tar czf build/silencer-linux-x64.tar.gz -C build/package silencer

      - uses: actions/upload-artifact@v4
        with:
          name: linux-x64
          path: build/silencer-linux-x64.tar.gz
          if-no-files-found: error

  release:
    needs: [build-macos, build-windows, build-linux]
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Compute release metadata
        id: meta
        run: |
          if [[ "${GITHUB_REF}" == refs/tags/v* ]]; then
            echo "tag=${GITHUB_REF##*/}" >> $GITHUB_OUTPUT
            echo "name=${GITHUB_REF##*/}" >> $GITHUB_OUTPUT
            echo "prerelease=false" >> $GITHUB_OUTPUT
          else
            echo "tag=latest" >> $GITHUB_OUTPUT
            echo "name=Latest master (${GITHUB_SHA::8})" >> $GITHUB_OUTPUT
            echo "prerelease=true" >> $GITHUB_OUTPUT
          fi

      - uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.meta.outputs.tag }}
          name: ${{ steps.meta.outputs.name }}
          prerelease: ${{ steps.meta.outputs.prerelease }}
          target_commitish: ${{ github.sha }}
          generate_release_notes: true
          files: |
            artifacts/macos-arm64/*
            artifacts/windows-x64/*
            artifacts/linux-x64/*
          body: |
            ## Downloads

            - **macOS (Apple Silicon):** `silencer-macos-arm64.zip`
            - **Windows (x64):** `silencer-windows-x64.zip`
            - **Linux (x64):** `silencer-linux-x64.tar.gz`

            ## First-run warnings

            ### Windows
            The Windows build isn't code-signed. If SmartScreen shows *"Windows protected your PC"*, click **More info** → **Run anyway**.

  publish-npm:
    # Tag-only — manual workflow_dispatch on a non-tag ref skips this job
    # because the staging script needs a real semver to pin packages with.
    #
    # Gating note: `needs: [release]` means a publish failure marks the
    # whole Release workflow as failed, which gates deploy.yml's
    # workflow_run trigger. If publish-npm fails post-release-created, the
    # GitHub Release still lands but the engine deploy doesn't auto-fire —
    # rerun deploy.yml manually after fixing the npm side.
    if: startsWith(github.ref, 'refs/tags/v')
    needs: [release]
    runs-on: ubuntu-latest
    timeout-minutes: 15
    permissions:
      contents: read
      id-token: write  # for `npm publish --provenance` via GitHub OIDC.
    steps:
      - uses: actions/checkout@v4

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          registry-url: 'https://registry.npmjs.org'

      - uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Build top-level bundle
        # `bun run build` runs `bun build src/index.ts --target=bun` which
        # produces clients/tui/dist/index.js. The staging script copies
        # dist/ into the @arsia-mons/silencer package directory.
        run: |
          bun install --frozen-lockfile
          bun run --cwd clients/tui build

      - name: Stage npm packages
        env:
          VERSION: ${{ github.ref_name }}
        run: |
          ver="${VERSION#v}"
          bun clients/tui/scripts/stage-npm-packages.ts \
            --version "$ver" \
            --artifacts ./artifacts \
            --out ./npm-staging \
            --tui-pkg ./clients/tui

      - name: Publish to npm
        # Order matters for tidiness only — optionalDependencies don't fail
        # the install if the matching one isn't published yet, but we still
        # publish bottom-up: per-platform binaries → top-level → unscoped
        # redirect. --access public is required on first publish of a
        # scoped package; idempotent thereafter.
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
        run: |
          set -e
          for pkg in silencer-darwin-arm64 silencer-linux-x64 silencer-win32-x64 silencer silencer-tui; do
            echo "=== publishing $pkg ==="
            (cd "npm-staging/$pkg" && npm publish --access public --provenance)
          done
