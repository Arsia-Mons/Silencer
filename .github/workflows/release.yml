name: Release

on:
  push:
    tags: ['v*']
  workflow_dispatch:

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-macos:
    runs-on: macos-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v4

      - name: Install deps (Homebrew)
        # SDL3 and especially SDL3_mixer aren't reliably in homebrew-core
        # on the macos-latest runner image — install via setup-sdl below
        # (same approach as deploy.yml's Linux build).
        run: brew install minizip dylibbundler

      - name: Install SDL3 + SDL3_mixer
        uses: libsdl-org/setup-sdl@main
        with:
          version: 3-latest
          version-sdl-mixer: 3-latest

      - name: Configure
        env:
          LOBBY_HOST: ${{ vars.LOBBY_HOST }}
        run: |
          lobby="${LOBBY_HOST:-lobby.arsiamons.com}"
          cmake -B build -S clients/silencer \
            -DCMAKE_BUILD_TYPE=Release \
            -DCMAKE_OSX_DEPLOYMENT_TARGET=11.0 \
            -DSILENCER_LOBBY_HOST="$lobby" \
            -DSILENCER_MAP_API_URL="https://admin.arsiamons.com/api/maps" \
            -DSILENCER_VERSION="${GITHUB_REF_NAME#v}"

      - name: Build
        run: cmake --build build --config Release -j"$(sysctl -n hw.ncpu)"

      - name: Bundle dylibs
        working-directory: build
        run: |
          mkdir -p Silencer.app/Contents/Frameworks
          # setup-sdl exports SDL3_ROOT + SDL3_mixer_ROOT env vars pointing
          # at the per-runner install dirs (/var/folders/.../setupsdl/...).
          # Pass them to dylibbundler as -s search paths so it can resolve
          # @rpath/libSDL3*.dylib references in the binary. Without these,
          # dylibbundler drops into an interactive prompt loop and hangs.
          echo "--- SDL3 install roots ---"
          echo "  SDL3_ROOT=$SDL3_ROOT"
          echo "  SDL3_mixer_ROOT=$SDL3_mixer_ROOT"
          dylibbundler \
            -s "$SDL3_ROOT/lib" \
            -s "$SDL3_mixer_ROOT/lib" \
            --overwrite-dir \
            --bundle-deps \
            --create-dir \
            --fix-file Silencer.app/Contents/MacOS/Silencer \
            --dest-dir Silencer.app/Contents/Frameworks/ \
            --install-path @rpath/ \
            </dev/null
          install_name_tool -add_rpath @executable_path/../Frameworks \
            Silencer.app/Contents/MacOS/Silencer 2>/dev/null || true
          echo "--- bundled dylibs ---"
          ls Silencer.app/Contents/Frameworks/
          echo "--- main binary linkage ---"
          otool -L Silencer.app/Contents/MacOS/Silencer

      - name: Import Developer ID cert
        env:
          CERT_P12_BASE64: ${{ secrets.APPLE_CERT_P12_BASE64 }}
          CERT_P12_PASSWORD: ${{ secrets.APPLE_CERT_P12_PASSWORD }}
        run: |
          KEYCHAIN_PASSWORD="$(openssl rand -base64 24)"
          echo "KEYCHAIN_PASSWORD=$KEYCHAIN_PASSWORD" >> "$GITHUB_ENV"
          echo "$CERT_P12_BASE64" | base64 --decode > /tmp/cert.p12
          security create-keychain -p "$KEYCHAIN_PASSWORD" build.keychain
          security set-keychain-settings -lut 21600 build.keychain
          security unlock-keychain -p "$KEYCHAIN_PASSWORD" build.keychain
          security import /tmp/cert.p12 -P "$CERT_P12_PASSWORD" \
            -A -t cert -f pkcs12 -k build.keychain
          security list-keychains -d user -s build.keychain \
            $(security list-keychains -d user | tr -d '"')
          security set-key-partition-list -S apple-tool:,apple:,codesign: \
            -s -k "$KEYCHAIN_PASSWORD" build.keychain
          rm /tmp/cert.p12
          security find-identity -v -p codesigning build.keychain

      - name: Codesign with Developer ID
        working-directory: build
        env:
          TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
        run: |
          IDENTITY="Developer ID Application"
          # Sign inside-out: dylibs first, then main binary, then bundle.
          # --options runtime (Hardened Runtime) + --timestamp are required
          # by notarytool.
          find Silencer.app/Contents/Frameworks -name "*.dylib" -print0 \
            | xargs -0 -n1 codesign --force --timestamp --options runtime \
              --sign "$IDENTITY"
          codesign --force --timestamp --options runtime \
            --sign "$IDENTITY" Silencer.app/Contents/MacOS/Silencer
          codesign --force --timestamp --options runtime \
            --sign "$IDENTITY" Silencer.app
          codesign --verify --deep --strict --verbose=2 Silencer.app

      - name: Notarize and staple
        working-directory: build
        env:
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APPLE_APP_PASSWORD: ${{ secrets.APPLE_APP_PASSWORD }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
        run: |
          ditto -ck --keepParent Silencer.app /tmp/notarize.zip
          xcrun notarytool submit /tmp/notarize.zip \
            --apple-id "$APPLE_ID" \
            --password "$APPLE_APP_PASSWORD" \
            --team-id "$APPLE_TEAM_ID" \
            --wait
          rm /tmp/notarize.zip
          xcrun stapler staple Silencer.app
          xcrun stapler validate Silencer.app
          spctl -a -vv -t execute Silencer.app

      - name: Package .app
        working-directory: build
        run: |
          ditto -ck --sequesterRsrc --keepParent Silencer.app silencer-macos-arm64.zip

      - name: Clean up keychain
        if: always()
        run: |
          security delete-keychain build.keychain || true

      - uses: actions/upload-artifact@v4
        with:
          name: macos-arm64
          path: build/silencer-macos-arm64.zip
          if-no-files-found: error

  build-windows:
    runs-on: windows-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4

      - name: Cache vcpkg binaries
        uses: actions/cache@v4
        with:
          path: ${{ github.workspace }}/.vcpkg-cache
          key: vcpkg-${{ runner.os }}-${{ hashFiles('clients/silencer/vcpkg.json') }}
          restore-keys: |
            vcpkg-${{ runner.os }}-

      - name: Cache vcpkg tool downloads
        uses: actions/cache@v4
        with:
          path: C:\vcpkg\downloads\tools
          key: vcpkg-tools-${{ runner.os }}-v1

      - name: Setup MSVC dev environment
        uses: ilammy/msvc-dev-cmd@v1
        with:
          arch: x64

      - name: Configure
        shell: pwsh
        env:
          LOBBY_HOST: ${{ vars.LOBBY_HOST }}
          VCPKG_BINARY_SOURCES: "clear;files,${{ github.workspace }}/.vcpkg-cache,readwrite"
        run: |
          $lobby = if ($env:LOBBY_HOST) { $env:LOBBY_HOST } else { "lobby.arsiamons.com" }
          $ver = $env:GITHUB_REF_NAME -replace '^v', ''
          cmake -B build -S clients/silencer `
            -G Ninja `
            -DCMAKE_BUILD_TYPE=Release `
            -DCMAKE_TOOLCHAIN_FILE="$env:VCPKG_INSTALLATION_ROOT/scripts/buildsystems/vcpkg.cmake" `
            -DVCPKG_TARGET_TRIPLET=x64-windows `
            -DSILENCER_LOBBY_HOST="$lobby" `
            -DSILENCER_MAP_API_URL="https://admin.arsiamons.com/api/maps" `
            -DSILENCER_VERSION="$ver"

      - name: Build
        run: cmake --build build

      - name: Package
        shell: pwsh
        run: |
          $stage = "build/package/silencer"
          New-Item -ItemType Directory -Force -Path $stage | Out-Null
          Copy-Item build/Silencer.exe $stage/
          # SDL3 / SDL3_mixer / zlib + transitive audio codec DLLs live in
          # the vcpkg manifest-mode install dir. Bulk-copy them so the zip
          # is self-contained — without these, Silencer.exe fails to start
          # with a missing SDL3.dll error on machines without vcpkg.
          $vcpkgBin = "build/vcpkg_installed/x64-windows/bin"
          Copy-Item "$vcpkgBin/*.dll" $stage/
          # Ship assets next to the .exe as `assets/` — Windows runtime
          # (`os.cpp` GetResDir) looks for `<exepath>\assets\`.
          Copy-Item -Recurse shared/assets $stage/assets
          Write-Host "--- packaged files ---"
          Get-ChildItem $stage
          Compress-Archive -Path "build/package/silencer" -DestinationPath build/silencer-windows-x64.zip -Force

      - uses: actions/upload-artifact@v4
        with:
          name: windows-x64
          path: build/silencer-windows-x64.zip
          if-no-files-found: error

  release:
    needs: [build-macos, build-windows]
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Compute release metadata
        id: meta
        run: |
          if [[ "${GITHUB_REF}" == refs/tags/v* ]]; then
            echo "tag=${GITHUB_REF##*/}" >> $GITHUB_OUTPUT
            echo "name=${GITHUB_REF##*/}" >> $GITHUB_OUTPUT
            echo "prerelease=false" >> $GITHUB_OUTPUT
          else
            echo "tag=latest" >> $GITHUB_OUTPUT
            echo "name=Latest master (${GITHUB_SHA::8})" >> $GITHUB_OUTPUT
            echo "prerelease=true" >> $GITHUB_OUTPUT
          fi

      - uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.meta.outputs.tag }}
          name: ${{ steps.meta.outputs.name }}
          prerelease: ${{ steps.meta.outputs.prerelease }}
          target_commitish: ${{ github.sha }}
          generate_release_notes: true
          files: |
            artifacts/macos-arm64/*
            artifacts/windows-x64/*
          body: |
            ## Downloads

            - **macOS (Apple Silicon):** `silencer-macos-arm64.zip`
            - **Windows (x64):** `silencer-windows-x64.zip`

            ## First-run warnings

            ### Windows
            The Windows build isn't code-signed. If SmartScreen shows *"Windows protected your PC"*, click **More info** → **Run anyway**.
