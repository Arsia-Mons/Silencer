name: Deploy admin-api

on:
  push:
    branches: [main]
    paths:
      - 'services/admin-api/**'
      - '.github/workflows/deploy-admin-api.yml'
  workflow_dispatch:

concurrency:
  group: deploy-admin-api
  cancel-in-progress: false

jobs:
  build-and-deploy:
    runs-on: ubuntu-24.04-arm
    timeout-minutes: 15
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4

      - name: Compute image ref
        id: img
        run: |
          set -euo pipefail
          # Lowercase the owner (GHCR rejects uppercase paths, GitHub
          # repo names allow them).
          OWNER="$(echo '${{ github.repository_owner }}' | tr '[:upper:]' '[:lower:]')"
          IMAGE="ghcr.io/$OWNER/silencer-admin-api"
          SHORT="${GITHUB_SHA:0:8}"
          echo "image=$IMAGE" >> "$GITHUB_OUTPUT"
          echo "tag=$SHORT"   >> "$GITHUB_OUTPUT"
          echo "ref=$IMAGE:$SHORT" >> "$GITHUB_OUTPUT"

      - uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build + push image (ARM64 native)
        uses: docker/build-push-action@v6
        with:
          context: services/admin-api
          file: services/admin-api/Dockerfile
          push: true
          platforms: linux/arm64
          tags: |
            ${{ steps.img.outputs.ref }}
            ${{ steps.img.outputs.image }}:latest
          cache-from: type=gha,scope=admin-api
          cache-to: type=gha,scope=admin-api,mode=max

      - name: Tailscale
        run: |
          curl -fsSL https://tailscale.com/install.sh | sh
          sudo tailscale up \
            --authkey='${{ secrets.TS_AUTHKEY }}' \
            --hostname=gh-runner-${{ github.run_id }} \
            --advertise-tags=tag:server

      - name: Configure SSH
        run: |
          mkdir -p ~/.ssh
          printf '%s\n' "${{ secrets.DEPLOY_SSH_KEY }}" > ~/.ssh/deploy
          chmod 600 ~/.ssh/deploy

      - name: Deploy via SSH
        env:
          HOST: ${{ vars.ADMIN_DEPLOY_HOST }}
          IMAGE_REF: ${{ steps.img.outputs.ref }}
        run: |
          set -euo pipefail
          ssh -i ~/.ssh/deploy \
              -o StrictHostKeyChecking=accept-new \
              -o UserKnownHostsFile=~/.ssh/known_hosts \
              "ubuntu@$HOST" "
            set -e
            echo 'IMAGE=$IMAGE_REF' | sudo tee /etc/silencer/admin-api.image > /dev/null
            sudo systemctl restart silencer-admin-api
            sleep 5
            sudo systemctl is-active silencer-admin-api
          "
