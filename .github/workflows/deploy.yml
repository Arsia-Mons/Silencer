name: Deploy

on:
  workflow_run:
    workflows: ['Release']
    types: [completed]
  workflow_dispatch:
    inputs:
      update_manifest:
        description: >-
          Also refresh update.json on the lobby. Requires dispatching this
          workflow on a v* tag ref whose release has macOS + Windows zips.
        type: boolean
        default: false

concurrency:
  group: deploy
  cancel-in-progress: false

jobs:
  build-and-deploy:
    # Cascade only when upstream Release was a successful v* tag push.
    # Manual dispatch always runs.
    if: >
      github.event_name == 'workflow_dispatch' ||
      (github.event_name == 'workflow_run' &&
       github.event.workflow_run.event == 'push' &&
       github.event.workflow_run.conclusion == 'success' &&
       startsWith(github.event.workflow_run.head_branch, 'v'))
    runs-on: ubuntu-24.04-arm
    timeout-minutes: 15
    steps:
      - name: Resolve deploy context
        id: ctx
        env:
          EVENT_NAME: ${{ github.event_name }}
          DISPATCH_REF: ${{ github.ref }}
          DISPATCH_SHA: ${{ github.sha }}
          DISPATCH_MANIFEST: ${{ inputs.update_manifest }}
          WF_RUN_TAG: ${{ github.event.workflow_run.head_branch }}
          WF_RUN_SHA: ${{ github.event.workflow_run.head_sha }}
        run: |
          set -euo pipefail
          if [[ "$EVENT_NAME" == "workflow_run" ]]; then
            # Cascade from Release: head_branch is the pushed tag (e.g. v1.2.3).
            echo "tag=$WF_RUN_TAG"             >> "$GITHUB_OUTPUT"
            echo "checkout_ref=$WF_RUN_SHA"    >> "$GITHUB_OUTPUT"
            echo "update_manifest=true"        >> "$GITHUB_OUTPUT"
          else
            # Manual dispatch: honor the ref the user selected in the UI.
            TAG=""
            if [[ "$DISPATCH_REF" =~ ^refs/tags/(.+)$ ]]; then
              TAG="${BASH_REMATCH[1]}"
            fi
            if [[ "$DISPATCH_MANIFEST" == "true" && -z "$TAG" ]]; then
              echo "update_manifest=true requires dispatching on a v* tag ref" >&2
              exit 1
            fi
            echo "tag=$TAG"                              >> "$GITHUB_OUTPUT"
            echo "checkout_ref=$DISPATCH_SHA"            >> "$GITHUB_OUTPUT"
            echo "update_manifest=$DISPATCH_MANIFEST"    >> "$GITHUB_OUTPUT"
          fi

      - uses: actions/checkout@v4
        with:
          ref: ${{ steps.ctx.outputs.checkout_ref }}

      - uses: actions/setup-go@v5
        with:
          go-version: '1.22'
          cache-dependency-path: services/lobby/go.sum

      - name: Install C++ build deps
        uses: awalsh128/cache-apt-pkgs-action@v1
        with:
          packages: cmake build-essential zlib1g-dev libcurl4-openssl-dev libminizip-dev patchelf
          version: 2.0

      # SDL3 + SDL3_mixer aren't in Ubuntu Noble's apt repos. Install via
      # the official upstream action — handles caching, build-from-source,
      # and the SDL3_mixer satellite project.
      - name: Install SDL3 + SDL3_mixer
        id: setup-sdl
        uses: libsdl-org/setup-sdl@main
        with:
          install-linux-dependencies: true
          version: 3-latest
          version-sdl-mixer: 3-latest

      - name: Setup ccache
        uses: hendrikmuhs/ccache-action@v1
        with:
          key: ${{ runner.os }}-${{ github.job }}
          max-size: 500M

      - name: Build lobby server
        working-directory: services/lobby
        run: go build -trimpath -ldflags '-s -w' -o silencer-lobby .

      - name: Build dedicated server (C++ / ARM64)
        env:
          LOBBY_HOST: ${{ vars.LOBBY_HOST }}
        run: |
          mkdir -p build && cd build
          cmake \
            -DCMAKE_C_COMPILER_LAUNCHER=ccache \
            -DCMAKE_CXX_COMPILER_LAUNCHER=ccache \
            -DSILENCER_LOBBY_HOST="${LOBBY_HOST:-lobby.arsiamons.com}" \
            ../clients/silencer
          make -j"$(nproc)"

      # Ship SDL3 + SDL3_mixer .so files in lib/ next to the binary, with
      # rpath = $ORIGIN/lib, so the dedicated server runs on the lobby box
      # without anything SDL-related installed system-wide. Otherwise a
      # fresh instance (or any box where setup-sdl's per-runner install
      # never landed) gets "libSDL3_mixer.so.0: cannot open shared object
      # file" when the lobby spawns a dedicated server, exit status 127,
      # and games never start. Resolve the .so files via the env vars
      # setup-sdl exports (SDL3_ROOT / SDL3_mixer_ROOT).
      - name: Bundle SDL3 libs with binary
        env:
          SDL3_ROOT: ${{ env.SDL3_ROOT }}
          SDL3_MIXER_ROOT: ${{ env.SDL3_mixer_ROOT }}
        run: |
          set -euo pipefail
          mkdir -p build/lib
          cp -L "$SDL3_ROOT/lib/libSDL3.so.0" build/lib/
          cp -L "$SDL3_MIXER_ROOT/lib/libSDL3_mixer.so.0" build/lib/
          patchelf --set-rpath '$ORIGIN/lib' build/silencer
          echo "--- bundled libs ---"
          ls -la build/lib/
          echo "--- binary linkage ---"
          # Use LD_LIBRARY_PATH for the diag print since rpath only resolves
          # relative to the binary's actual on-disk location.
          (cd build && LD_LIBRARY_PATH=lib ldd silencer | grep -E "SDL3|not found")

      - name: Build update.json from release artifacts
        if: steps.ctx.outputs.update_manifest == 'true'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAG: ${{ steps.ctx.outputs.tag }}
        run: |
          set -euo pipefail
          mkdir -p manifest-staging
          cd manifest-staging
          gh release download "$TAG" \
            -R "${{ github.repository }}" \
            -p "silencer-macos-arm64.zip" \
            -p "silencer-windows-x64.zip"

          MAC_SHA=$(shasum -a 256 silencer-macos-arm64.zip | awk '{print $1}')
          WIN_SHA=$(shasum -a 256 silencer-windows-x64.zip | awk '{print $1}')

          BASE="https://github.com/${{ github.repository }}/releases/download/${TAG}"
          cat > update.json <<EOF
          {
            "version":        "${TAG#v}",
            "macos_url":      "${BASE}/silencer-macos-arm64.zip",
            "macos_sha256":   "${MAC_SHA}",
            "windows_url":    "${BASE}/silencer-windows-x64.zip",
            "windows_sha256": "${WIN_SHA}"
          }
          EOF
          cat update.json
          rm silencer-macos-arm64.zip silencer-windows-x64.zip

      - name: Tailscale
        run: |
          curl -fsSL https://tailscale.com/install.sh | sh
          sudo tailscale up \
            --authkey='${{ secrets.TS_AUTHKEY }}' \
            --hostname=gh-runner-${{ github.run_id }} \
            --advertise-tags=tag:server

      - name: Configure SSH
        run: |
          mkdir -p ~/.ssh
          printf '%s\n' "${{ secrets.DEPLOY_SSH_KEY }}" > ~/.ssh/deploy
          chmod 600 ~/.ssh/deploy

      - name: Deploy
        env:
          HOST: ${{ vars.DEPLOY_HOST }}
          SHA: ${{ steps.ctx.outputs.checkout_ref }}
          UPDATE_MANIFEST: ${{ steps.ctx.outputs.update_manifest }}
        run: |
          set -euo pipefail
          SHORT=${SHA:0:8}
          STAGING=/tmp/silencer-$SHORT
          RELEASE=/opt/silencer/releases/$SHORT
          SSH_OPTS="-i ~/.ssh/deploy -o StrictHostKeyChecking=accept-new -o UserKnownHostsFile=~/.ssh/known_hosts"
          SSH="ssh $SSH_OPTS ubuntu@$HOST"
          SCP="scp $SSH_OPTS"

          $SSH "mkdir -p $STAGING"
          $SCP services/lobby/silencer-lobby ubuntu@$HOST:$STAGING/
          $SCP build/silencer         ubuntu@$HOST:$STAGING/
          $SCP -r build/lib           ubuntu@$HOST:$STAGING/
          $SCP -r shared/assets       ubuntu@$HOST:$STAGING/

          if [[ "$UPDATE_MANIFEST" == "true" ]]; then
            $SCP manifest-staging/update.json ubuntu@$HOST:$STAGING/update.json
          fi

          # Atomic swap: move manifest into place, flip symlink, restart —
          # all in one SSH session so clients never see a new lobby version
          # without a matching update.json.
          $SSH "
            set -e
            sudo mkdir -p /opt/silencer/releases
            sudo rm -rf $RELEASE
            sudo mv $STAGING $RELEASE
            sudo chmod +x $RELEASE/silencer-lobby $RELEASE/silencer
            if [ -f $RELEASE/update.json ]; then
              sudo mv $RELEASE/update.json /opt/silencer/update.json
            fi
            sudo ln -sfn $RELEASE /opt/silencer/current
            sudo ln -sfn /opt/silencer/current/assets /usr/local/share/silencer

            # Ensure map API listens on :15172 (idempotent drop-in).
            # NOTE: -public-addr must be a dotted-decimal IP, not a hostname —
            # the C++ joining-client path resolves the game host with
            # inet_addr() (game.cpp / world.cpp), which silently fails on
            # hostnames. Until that's replaced with getaddrinfo, use the EIP.
            sudo mkdir -p /etc/systemd/system/silencer-lobby.service.d
            printf '[Service]\nExecStart=\nExecStart=/opt/silencer/current/silencer-lobby -addr :517 -db /var/lib/silencer/lobby.json -maps-dir /var/lib/silencer/maps -map-api-addr :15172 -update-manifest /opt/silencer/update.json -public-addr 54.241.183.70 -game-binary /opt/silencer/current/silencer\n' | sudo tee /etc/systemd/system/silencer-lobby.service.d/map-api.conf > /dev/null
            sudo systemctl daemon-reload
            sudo systemctl restart silencer-lobby
            sleep 2
            sudo systemctl is-active silencer-lobby
          "

      - name: Prune old releases (keep last 3)
        env:
          HOST: ${{ vars.DEPLOY_HOST }}
        run: |
          ssh -i ~/.ssh/deploy ubuntu@$HOST "
            cd /opt/silencer/releases
            ls -1t | tail -n +4 | xargs -r sudo rm -rf
          "
