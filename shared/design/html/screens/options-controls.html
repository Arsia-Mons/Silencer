<h1>Options &gt; Controls</h1>
<p>Factory: <code>CreateOptionsControlsInterface :2613</code>. Key-binding
config — uses the wide <code>B236x27</code> button variant.</p>

<div class="canvas">

  <button class="btn btn-B156x21" style="left:50%;top:430px;transform:translateX(-50%)" tabindex="9" data-escape-button>BACK</button>
</div>
